services:
  minio:
    image: minio/minio
    container_name: apecx-minio
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Web UI port
    environment:
      MINIO_ROOT_USER: apecx
      MINIO_ROOT_PASSWORD: apecxgacorlancarjaya
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data: